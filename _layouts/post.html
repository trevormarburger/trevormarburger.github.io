---
layout: default
---

<div class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <span class="post-date">
      | {{ page.date | date_to_string }}
      {% assign words = content | number_of_words %}
      {% if words < 360 %}
        | 1 min read
      {% else %}
        | {{ words | divided_by: 180 }} min read
      {% endif %}
    </span>
  </header>
  {{ content }}
</div>
